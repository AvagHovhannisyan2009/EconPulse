name: Test EconPulse AI Agent

on:
  workflow_dispatch:

jobs:
  test-edge-function:
    runs-on: ubuntu-latest

    steps:
      - name: Call econpulse-ai-agent with status output
        run: |
          echo "Testing econpulse-ai-agent..."

          http_response=$(mktemp)

          http_code=$(curl -sS -o "$http_response" -w "%{http_code}" -X POST "https://vevebvrssinajsmijpoy.functions.supabase.co/econpulse-ai-agent" \
            -H "Content-Type: application/json" \
            -d '{
              "secret": "42e2311b182f56a2e2cea5c8e00147bd48b7deada22e5",
              "smoke": true,
              "sources": [
                {
                  "url": "https://feeds.bbci.co.uk/news/world/rss.xml",
                  "limit": 3
                },
                {
                  "url": "https://rss.nytimes.com/services/xml/rss/nyt/World.xml",
                  "limit": 3
                }
              ],
              "model": "gpt2"
            }')

          echo "HTTP status: $http_code"
          echo "Response body:"
          cat "$http_response"

          if [ "$http_code" -ge 400 ]; then
            echo ""
            echo "Request failed."
            exit 1
          fi
